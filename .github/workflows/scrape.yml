name: 🏠 Chasseur d'appartements

on:
  schedule:
    - cron: '0 * * * *'   # Toutes les heures
  workflow_dispatch:        # Lancement manuel possible depuis GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: pip install requests beautifulsoup4 lxml

      - name: 🔍 Lancer le scraper
        run: python scraper.py

      - name: 💾 Sauvegarder les annonces vues
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ annonces_vues.json || true
          git diff --staged --quiet || git commit -m "🏠 Mise à jour annonces $(date +'%d/%m %H:%M')"
          git push

      - name: 🌐 Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
