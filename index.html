<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏠 Chasseur d'apparts — Chargement...</title>
<style>
  body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
         height: 100vh; margin: 0; background: #f0f4f8; flex-direction: column; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 5px solid #e2e8f0;
             border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #64748b; font-size: 1.1em; }
</style>
</head>
<body>
  <div class="spinner"></div>
  <p>Première recherche en cours… Revenez dans quelques minutes !</p>
  <p style="font-size:0.85em;color:#94a3b8">La page se mettra à jour automatiquement toutes les heures.</p>
</body>
</html>
